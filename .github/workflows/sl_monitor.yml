name: Stonez SL Monitor

on:
  schedule:
    - cron: "15,45 3 * * 1-5"
    - cron: "15,45 4 * * 1-5"
    - cron: "15,45 5 * * 1-5"
    - cron: "15,45 6 * * 1-5"
    - cron: "15,45 7 * * 1-5"
    - cron: "15,45 8 * * 1-5"
    - cron: "15,45 9 * * 1-5"
    - cron: "0 10 * * 1-5"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run SL monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 sl_monitor.py
      - name: Commit trade state
        run: |
          git config user.name "stonez-bot"
          git config user.email "stonez-bot@github.com"
          git add trade_state.json || true
          git diff --staged --quiet || git commit -m "chore: trade state [skip ci]"
          git push || true
