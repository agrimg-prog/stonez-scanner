name: Stonez SL Monitor

on:
  schedule:
    # Every 30 min, 9:15 AM to 3:30 PM IST (3:45 AM to 10:00 AM UTC), Mon-Fri
    - cron: "15,45 3 * * 1-5"    # 8:45, 9:15 AM IST
    - cron: "15,45 4 * * 1-5"    # 9:45, 10:15 AM IST
    - cron: "15,45 5 * * 1-5"    # 10:45, 11:15 AM IST
    - cron: "15,45 6 * * 1-5"    # 11:45, 12:15 PM IST
    - cron: "15,45 7 * * 1-5"    # 12:45, 1:15 PM IST
    - cron: "15,45 8 * * 1-5"    # 1:45, 2:15 PM IST
    - cron: "15,45 9 * * 1-5"    # 2:45, 3:15 PM IST
    - cron: "0 10 * * 1-5"       # 3:30 PM IST — final check

  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    # Give write permission so it can commit trade_state.json back
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run SL monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 sl_monitor.py

      # Commit trade_state.json back so state persists across runs
      - name: Save trade state
        run: |
          git config user.name  "stonez-bot"
          git config user.email "stonez-bot@github.com"
          git add trade_state.json || true
          git diff --staged --quiet || git commit -m "chore: update trade state [skip ci]"
          git push || true
