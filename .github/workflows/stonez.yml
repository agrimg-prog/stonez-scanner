name: Stonez Daily Scan

on:
  schedule:
    # IST = UTC+5:30
    # 9:20 AM IST  = 3:50 AM UTC
    # 3:25 PM IST  = 9:55 AM UTC
    - cron: "50 3 * * 1-5"   # 9:20 AM IST  — morning scan (Mon–Fri)
    - cron: "55 9 * * 1-5"   # 3:25 PM IST  — end-of-day scan (Mon–Fri)

  # Also allows manual trigger from GitHub UI → Actions tab → Run workflow
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Stonez scan
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 run_scan.py
